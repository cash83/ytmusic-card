<svg viewBox="0 0 380 620" xmlns="http://www.w3.org/2000/svg" font-family="'Roboto','Segoe UI',system-ui,sans-serif">
  <defs>
    <clipPath id="artc"><circle cx="190" cy="230" r="92"/></clipPath>
    <linearGradient id="artg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#5a3b2b"/><stop offset="1" stop-color="#241a12"/></linearGradient>
  </defs>
  <rect width="380" height="620" rx="16" fill="#0f0f0f"/>

  <!-- header -->
  <circle cx="26" cy="28" r="11" fill="#ff0000"/><path d="M22 23 v10 l9 -5 z" fill="#fff"/>
  <text x="44" y="33" fill="#fff" font-size="15" font-weight="700">Music</text>
  <text x="200" y="30" fill="#8a8a8a" font-size="10" font-weight="700" letter-spacing="1" text-anchor="middle">IN RIPRODUZIONE</text>

  <!-- tabs -->
  <text x="60" y="62" fill="#fff" font-size="13" font-weight="700" text-anchor="middle">Riproduzione</text>
  <rect x="20" y="70" width="80" height="3" rx="1.5" fill="#ff0000"/>
  <text x="150" y="62" fill="#8a8a8a" font-size="13" text-anchor="middle">In coda</text>

  <!-- chips -->
  <g font-size="11" font-weight="600">
    <rect x="20" y="84" width="56" height="26" rx="13" fill="#fff"/><text x="48" y="101" fill="#0f0f0f" text-anchor="middle">Per te</text>
    <rect x="84" y="84" width="96" height="26" rx="13" fill="#1f1f1f" stroke="#333"/><text x="132" y="101" fill="#ddd" text-anchor="middle">Scelte rapide</text>
    <rect x="188" y="84" width="112" height="26" rx="13" fill="#1f1f1f" stroke="#333"/><text x="244" y="101" fill="#ddd" text-anchor="middle">Dalla community</text>
    <rect x="308" y="84" width="80" height="26" rx="13" fill="#1f1f1f" stroke="#333"/>
  </g>

  <!-- round art -->
  <circle cx="190" cy="230" r="92" fill="url(#artg)"/>
  <g clip-path="url(#artc)">
    <rect x="98" y="138" width="184" height="184" fill="url(#artg)"/>
    <text x="190" y="228" fill="#e8e0d5" font-size="15" font-weight="800" text-anchor="middle" opacity="0.9">Bollicine</text>
    <text x="190" y="250" fill="#e8e0d5" font-size="11" text-anchor="middle" opacity="0.7">Vasco Rossi</text>
  </g>

  <!-- title -->
  <text x="24" y="356" fill="#fff" font-size="18" font-weight="800">Una canzone per te</text>
  <text x="24" y="377" fill="#9a9a9a" font-size="12">Vasco Rossi</text>

  <!-- wavy progress -->
  <text x="24" y="410" fill="#9a9a9a" font-size="11">1:22</text>
  <path d="M52 406 Q62 399 72 406 T92 406 T112 406 T132 406" fill="none" stroke="#ff0000" stroke-width="3" stroke-linecap="round"/>
  <path d="M132 406 Q142 399 152 406 T172 406 T192 406 T212 406 T232 406 T252 406 T272 406 T292 406 T312 406 T332 406" fill="none" stroke="#3a3a3a" stroke-width="3" stroke-linecap="round"/>
  <circle cx="132" cy="406" r="6" fill="#ff0000"/>
  <text x="356" y="410" fill="#9a9a9a" font-size="11" text-anchor="end">4:00</text>

  <!-- controls -->
  <rect x="112" y="432" width="50" height="42" rx="13" fill="#2c2c2e"/><path d="M143 445 l-12 8 l12 8 z M129 445 h-3 v16 h3 z" fill="#fff"/>
  <rect x="172" y="428" width="92" height="50" rx="15" fill="#ff0000"/><rect x="204" y="440" width="6" height="26" rx="1.5" fill="#fff"/><rect x="226" y="440" width="6" height="26" rx="1.5" fill="#fff"/>
  <rect x="274" y="432" width="50" height="42" rx="13" fill="#2c2c2e"/><path d="M293 445 l12 8 l-12 8 z M307 445 h3 v16 h-3 z" fill="#fff"/>

  <!-- pills -->
  <g font-size="12" font-weight="600">
    <rect x="98" y="496" width="92" height="30" rx="15" fill="rgba(255,0,0,0.14)" stroke="#ff0000"/><text x="144" y="516" fill="#fff" text-anchor="middle">🔀 Casuale</text>
    <rect x="200" y="496" width="82" height="30" rx="15" fill="#1f1f1f" stroke="#333"/><text x="241" y="516" fill="#fff" text-anchor="middle">🔁 Ripeti</text>
  </g>

  <!-- volume -->
  <rect x="44" y="552" width="290" height="26" rx="13" fill="#2a2f3a"/>
  <rect x="44" y="552" width="150" height="26" rx="13" fill="#ff0000" opacity="0.85"/>
  <circle cx="194" cy="565" r="11" fill="#fff"/>
  <text x="352" y="573" font-size="16" text-anchor="end">🔊</text>
</svg>
